upstream omniops_web {
    server web:8000;
}

# 1. HTTP (80) Trafiğini HTTPS'e Yönlendirme ve SSL Doğrulama Bloğu
server {
    listen 80;
    server_name senindomain.com www.senindomain.com;

    # Certbot'un SSL sertifikası alırken kullanacağı doğrulama dizini
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Kalan tüm HTTP trafiğini HTTPS'e zorla
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS (443) Trafiği ve Django Bağlantısı
server {
    listen 443 ssl;
    server_name senindomain.com www.senindomain.com;

    # SSL Sertifika Yolları (Certbot tarafından otomatik oluşturulacak)
    ssl_certificate /etc/letsencrypt/live/senindomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/senindomain.com/privkey.pem;
    
    # Gelişmiş SSL Güvenlik Ayarları (A+ Skoru İçin)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Statik Dosyalar (CSS, JS, Görseller) - Nginx tarafından hızlıca sunulur
    location /static/ {
        alias /usr/src/app/staticfiles/;
    }

    location /media/ {
        alias /usr/src/app/mediafiles/;
    }

    # Geri kalan tüm trafiği Django'ya (Gunicorn) Aktar
    location / {
        proxy_pass http://omniops_web;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        
        # WebSocket Desteği (Live-Refresh ve Polling işlemleri için kritik)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}